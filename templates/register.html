{% extends "base.html" %}
{% block title %}Register — FinTrack{% endblock %}

{% block content %}
<style>
    .main { margin: 0; padding: 0; width: 100%; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .auth-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: 24px; padding: 48px 44px; width: min(440px, 100%); }
</style>

<div class="auth-box">
    <div style="margin-bottom:28px;">
        <h1 style="font-family:'Playfair Display',serif; font-size:1.7rem; color:var(--accent);">FinTrack</h1>
        <h2 style="font-family:'Playfair Display',serif; font-size:1.4rem; margin-top:16px; margin-bottom:4px;">Create Account</h2>
        <p style="color:var(--text-2); font-size:0.85rem;">Start tracking your finances today</p>
    </div>

    <form method="POST">
        <div style="margin-bottom:16px;">
            <label>Username</label>
            <input type="text" name="username" class="form-control-dark w-100" placeholder="Choose a username" required>
        </div>
        <div style="margin-bottom:16px;">
            <label>Email</label>
            <input type="email" name="email" class="form-control-dark w-100" placeholder="your@email.com" required>
        </div>
        <div style="margin-bottom:24px;">
            <label>Password</label>
            <input type="password" name="password" class="form-control-dark w-100" placeholder="Min. 6 characters" required minlength="6">
        </div>
        <button type="submit" class="btn-gold w-100" style="padding:12px;">Create Account</button>
    </form>

    <p style="text-align:center; margin-top:20px; font-size:0.85rem; color:var(--text-2);">
        Already have an account?
        <a href="{{ url_for('login') }}" style="color:var(--accent); text-decoration:none;">Sign In</a>
    </p>
</div>
{% endblock %}
